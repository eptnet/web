<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Virtual | EPT Edu</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/hFRyKrxY/logo-epist-v3-1x1-c.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/edu/css/nooc.css">
</head>
<body class="nooc-classroom-body">
    <canvas id="edu-canvas"></canvas>

    <div class="nooc-layout">
        
        <div class="mobile-top-bar">
            <button class="hamburger-btn" onclick="NoocRoom.toggleMobileMenu()"><i class="fa-solid fa-bars"></i></button>
            <div class="nav-brand" style="margin:0;"><img src="https://i.ibb.co/hFRyKrxY/logo-epist-v3-1x1-c.png" alt="Logo"> EPT <span class="accent-text">EDU</span></div>
        </div>

        <div id="mobile-overlay" class="mobile-overlay" onclick="NoocRoom.toggleMobileMenu()"></div>

        <aside class="nooc-sidebar-nav" id="sidebar-nav">
            <div class="nav-brand desktop-brand">
                <img src="https://i.ibb.co/hFRyKrxY/logo-epist-v3-1x1-c.png" alt="Logo">
                <span>EPT <span class="accent-text">EDU</span></span>
            </div>
            
            <nav class="course-menu">
                <button id="btn-nav-inicio" class="menu-item active-main" onclick="NoocRoom.showView('start')"><i class="fa-solid fa-house"></i> Inicio</button>
                <button id="btn-nav-feed" class="menu-item" onclick="NoocRoom.showView('feed')"><i class="fa-solid fa-users-rays"></i> Comunidad</button>
                <div class="menu-divider">Plan de Estudios</div>
                <div id="modules-nav-list">
                    </div>
            </nav>
            <a href="/edu" class="btn-exit"><i class="fa-solid fa-arrow-left"></i> Salir al Campus</a>
        </aside>

        <main class="nooc-main-stage">
            <div id="content-display" class="content-container">
                </div>
        </main>

        <aside class="nooc-sidebar-status">
            <div class="status-card profile-xp">
                <div class="avatar-sm" id="user-avatar-placeholder">
                    <i class="fa-solid fa-user-astronaut"></i>
                </div>
                <div class="xp-info">
                    <h4 id="user-name-display">Cargando...</h4>
                    <span class="rank-tag" id="user-rank">Recluta</span>
                </div>
                <div class="course-progress-box">
                    <div class="progress-labels">
                        <span>Progreso NOOC</span>
                        <span id="progress-percent">0%</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" id="course-progress-fill"></div>
                    </div>
                </div>
            </div>

            <div class="status-card online-users">
                <h5><i class="fa-solid fa-circle-dot" style="color: #10b981;"></i> Investigadores en línea</h5>
                <div class="user-stack" id="active-users-list">
                    </div>
            </div>

            <div id="extra-widget-container"></div>
        </aside>
    </div>

    <div id="lesson-modal" class="lesson-modal">
        <div class="modal-body">
            <div class="modal-top-bar">
                <span style="font-weight:bold; color:var(--color-text-secondary);"><i class="fa-solid fa-book-open"></i> Sala de Estudio</span>
                <button class="btn-close-modal" id="close-modal-btn" title="Cerrar lección"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="modal-content-scroll" id="lesson-modal-content">
                </div>
            
            <div class="modal-footer-bar">
                <p style="margin:0; font-size:0.85rem; opacity:0.6;">Asegúrate de revisar todo el material antes de continuar.</p>
                <button class="btn-action" onclick="NoocRoom.closeLessonModal()" style="margin:0;"><i class="fa-solid fa-check-double"></i> Completar Lección (+20 XP)</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/edu/js/nooc.js"></script>
</body>
</html>
