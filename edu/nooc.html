<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Virtual | EPT Edu</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/hFRyKrxY/logo-epist-v3-1x1-c.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/edu/css/nooc.css">
</head>
<body class="nooc-classroom-body">
    <canvas id="edu-canvas"></canvas>

    <div class="nooc-layout">
        <aside class="nooc-sidebar-nav">
            <div class="nav-brand">
                <img src="https://i.ibb.co/hFRyKrxY/logo-epist-v3-1x1-c.png" alt="Logo">
                <span>EPT <span class="accent-text">EDU</span></span>
            </div>
            <nav class="course-menu">
                <button class="menu-item active" onclick="NoocRoom.showView('start')"><i class="fa-solid fa-house"></i> Inicio</button>
                <button class="menu-item" onclick="NoocRoom.showView('feed')"><i class="fa-solid fa-comments"></i> El Pasillo (Feed)</button>
                <div class="menu-divider">Módulos</div>
                <div id="modules-nav-list">
                    </div>
                <div class="menu-divider">Finalización</div>
                <button class="menu-item" onclick="NoocRoom.showView('cert')"><i class="fa-solid fa-certificate"></i> Certificación</button>
            </nav>
            <a href="/edu" class="btn-exit"><i class="fa-solid fa-arrow-left"></i> Salir al Campus</a>
        </aside>

        <main class="nooc-main-stage">
            <div id="content-display" class="content-container">
                </div>
        </main>

        <aside class="nooc-sidebar-status">
            <div class="status-card profile-xp">
                <div class="avatar-sm" id="user-avatar-placeholder">
                    <i class="fa-solid fa-user-astronaut"></i>
                </div>
                <div class="xp-info">
                    <h4 id="user-name-display">Cargando...</h4>
                    <span class="rank-tag" id="user-rank">Recluta</span>
                </div>
                <div class="course-progress-box">
                    <div class="progress-labels">
                        <span>Progreso NOOC</span>
                        <span id="progress-percent">0%</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" id="course-progress-fill"></div>
                    </div>
                </div>
            </div>

            <div class="status-card online-users">
                <h5><i class="fa-solid fa-circle-dot" style="color: #10b981;"></i> Investigadores en línea</h5>
                <div class="user-stack" id="active-users-list">
                    </div>
            </div>

            <div id="extra-widget-container"></div>
        </aside>
    </div>

    <div id="lesson-modal" class="lesson-modal">
        <div class="modal-body">
            <button class="close-modal" onclick="NoocRoom.closeLesson()">&times;</button>
            <div id="lesson-modal-content"></div>
            <div class="modal-footer">
                <button class="btn-complete" onclick="NoocRoom.markComplete()"><i class="fa-solid fa-check"></i> Marcar como Completada (+20 XP)</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/edu/js/nooc.js"></script>
</body>
</html>
