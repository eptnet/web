<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analíticas del Curso | EPT Edu</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/hFRyKrxY/logo-epist-v3-1x1-c.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { background-color: #070a13; color: white; margin: 0; font-family: sans-serif; }
        .nav-header { padding: 20px; background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        .bento-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .bento-card { background: rgba(20,25,40,0.7); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; }
        .stat-value { font-size: 2.5rem; font-weight: 900; margin: 10px 0; color: #38bdf8; }
        
        .student-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .student-table th, .student-table td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .student-table th { color: #a0aab5; font-size: 0.85rem; text-transform: uppercase; }
        .student-row:hover { background: rgba(255,255,255,0.02); }
        
        .progress-bar-bg { width: 100px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #b72a1e, #ff3e3e); }
        
        .btn-edit { background: #b72a1e; color: white; padding: 8px 16px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
        .btn-edit:hover { background: #ff3e3e; }
    </style>
</head>
<body>

    <div class="nav-header">
        <div>
            <a href="/edu/" style="color: #a0aab5; text-decoration: none; font-size: 0.9rem;"><i class="fa-solid fa-arrow-left"></i> Volver al Campus</a>
            <h1 id="course-title" style="margin: 5px 0 0 0; font-size: 1.5rem;">Cargando Analíticas...</h1>
        </div>
        <div>
            <button id="btn-edit-course" class="btn-edit"><i class="fa-solid fa-pen-to-square"></i> Editar Curso</button>
        </div>
    </div>

    <div class="bento-grid">
        <div class="bento-card">
            <h3 style="margin:0; color:#a0aab5; font-size:0.9rem; text-transform:uppercase;"><i class="fa-solid fa-users"></i> Total Matriculados</h3>
            <div id="stat-students" class="stat-value">0</div>
        </div>
        <div class="bento-card">
            <h3 style="margin:0; color:#a0aab5; font-size:0.9rem; text-transform:uppercase;"><i class="fa-solid fa-check-double"></i> Progreso Promedio</h3>
            <div id="stat-progress" class="stat-value" style="color: #10b981;">0%</div>
        </div>
        <div class="bento-card">
            <h3 style="margin:0; color:#a0aab5; font-size:0.9rem; text-transform:uppercase;"><i class="fa-brands fa-bluesky"></i> Interacciones Foro</h3>
            <div id="stat-comments" class="stat-value" style="color: #f59e0b;">...</div>
            <a href="#" id="link-course-forum" target="_blank" style="color:#a0aab5; font-size:0.8rem;">Ver debate en Bluesky</a>
        </div>
    </div>

    <div class="bento-grid" style="grid-template-columns: 1fr;">
        <div class="bento-card">
            <h2 style="margin:0 0 15px 0;">Expediente de Alumnos</h2>
            <div style="overflow-x: auto;">
                <table class="student-table">
                    <thead>
                        <tr>
                            <th>Investigador</th>
                            <th>Bluesky / ORCID</th>
                            <th>Progreso del Curso</th>
                            <th>Ingreso</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="students-tbody">
                        <tr><td colspan="5" style="text-align: center; padding: 30px;"><i class="fa-solid fa-spinner fa-spin"></i> Recopilando datos...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/main.js"></script>
    <script src="/edu/js/course-analytics.js"></script>
</body>
</html>
