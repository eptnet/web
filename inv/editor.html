<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio Omnicanal - Epistecnología</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/hFRyKrxY/logo-epist-v3-1x1-c.png">
    
    <link rel="stylesheet" href="/inv/css/dashboard.css">
    <link rel="stylesheet" href="/inv/css/editor.css"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/list@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/image@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/raw"></script>
</head>
<body class="studio-body">
    <header class="studio-topbar">
        <div class="topbar-left">
            <a href="/inv/dashboard.html" class="back-btn" title="Volver al Dashboard"><i class="fa-solid fa-arrow-left"></i></a>
            <img src="https://i.ibb.co/hFRyKrxY/logo-epist-v3-1x1-c.png" alt="Logo" class="studio-logo">
            
            <div class="project-focus-selector">
                <label for="active-project-select"><i class="fa-solid fa-microscope"></i> Proyecto Activo:</label>
                <select id="active-project-select" class="form-control">
                    <option value="">Cargando proyectos...</option>
                </select>
                <span id="doi-badge" class="badge-hidden" title="Proyecto verificado con DOI"><i class="fa-solid fa-certificate"></i> DOI Verificado</span>
            </div>
            <div class="project-focus-selector" style="margin-left: 15px;">
                <label for="draft-select" style="color:#facc15;"><i class="fa-solid fa-file-pen"></i> Borradores:</label>
                <select id="draft-select" class="form-control">
                    <option value="">+ Nuevo Artículo...</option>
                </select>
            </div>
        </div>

        <div class="topbar-right">
            <button id="mobile-selectors-btn" class="mobile-only-btn" title="Opciones de Proyecto"><i class="fa-solid fa-sliders"></i></button>
            
            <span id="save-status" class="save-status"><i class="fa-solid fa-cloud"></i> Guardado automático</span>
            <button class="icon-btn" id="theme-switcher-studio" title="Cambiar tema"><i class="fa-solid fa-moon"></i></button>
            <button class="icon-btn logout-btn" id="logout-btn" title="Cerrar Sesión"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>
    </header>

    <main class="studio-workspace">
        
        <aside class="col-sidebar pane">
            <div class="sidebar-tabs">
                <button class="sidebar-tab-btn active" data-target="panel-ai"><i class="fa-solid fa-brain"></i> Asistente IA</button>
                <button class="sidebar-tab-btn" data-target="panel-dist"><i class="fa-solid fa-share-nodes"></i> Publicar</button>
            </div>

            <div id="panel-ai" class="sidebar-panel active">
                <div class="ai-tabs">
                    <button class="ai-tab-btn active" data-target="tab-text"><i class="fa-solid fa-pen-nib"></i> Texto</button>
                    <button class="ai-tab-btn" data-target="tab-image"><i class="fa-solid fa-image"></i> Imagen</button>
                </div>

                <div class="ai-tab-content active" id="tab-text">
                    <div class="form-group">
                        <label>¿Qué necesitas redactar?</label>
                        <select id="ai-task-dropdown" class="form-control">
                            <option value="social">Hilo para Redes Sociales</option>
                            <option value="summary">Resumen (Abstract)</option>
                            <option value="text">Artículo de Divulgación</option>
                            <option value="script">Guion para Video Corto</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Instrucciones adicionales (Opcional):</label>
                        <textarea id="ai-custom-prompt" rows="4" placeholder="Ej: Usa un tono irónico, enfócate en los resultados del año 2023..."></textarea>
                    </div>
                    <button id="ai-generate-text-btn" class="btn-primary w-100"><i class="fa-solid fa-wand-magic-sparkles"></i> Generar Texto</button>
                    <div id="ai-text-results" class="ai-results-container"></div>
                </div>

                <div class="ai-tab-content" id="tab-image">
                    <div class="form-group">
                        <label>¿Qué deseas pintar?</label>
                        <textarea id="ai-image-prompt" class="form-control" rows="3" placeholder="Ej: Un libro antiguo brillante rodeado de hologramas..."></textarea>
                    </div>
                    <div class="form-group-row" style="display: flex; gap: 10px; margin-bottom: 15px;">
                        <div style="flex: 1;">
                            <label>Estilo Visual</label>
                            <select id="ai-image-style" class="form-control">
                                <option value="editorial">🎨 Editorial</option>
                                <option value="realistic">📸 Fotográfico</option>
                            </select>
                        </div>
                        <div style="flex: 1;">
                            <label>Formato</label>
                            <select id="ai-image-ratio" class="form-control">
                                <option value="16:9">16:9 (Hor.)</option>
                                <option value="1:1">1:1 (Cuad.)</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label>Motor de IA</label>
                        <select id="ai-image-engine" class="form-control">
                            <option value="flux">FLUX.1 (Premium)</option>
                            <option value="z-image">Z-Image (Rápido)</option>
                        </select>
                    </div>
                    <button id="ai-generate-image-btn" class="btn-primary w-100"><i class="fa-solid fa-palette"></i> Pintar Imagen</button>
                    <div id="ai-image-results"></div>
                </div>
            </div>

            <div id="panel-dist" class="sidebar-panel">
                <div class="distribution-section">
                    <h3>1. Destinos</h3>
                    <div class="network-toggles">
                        <label class="network-toggle">
                            <input type="checkbox" id="dest-epistecnologia" checked disabled> <span class="network-icon epist-bg"><i class="fa-solid fa-microscope"></i></span> Comunidad
                        </label>
                        
                        <div style="margin-top: 10px; padding: 12px; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 8px; display: flex; align-items: center; justify-content: space-between;">
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <i class="fa-solid fa-envelope-open-text" style="color: #10b981; font-size: 1.1rem;"></i>
                                <span style="font-size: 0.85rem; color: var(--color-text-primary); font-weight: 500;">Enviar por correo</span>
                            </div>
                            <label style="position: relative; display: inline-block; width: 36px; height: 18px; cursor: pointer;">
                                <input type="checkbox" id="toggle-newsletter" checked style="display: none;">
                                <span class="slider-bg" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: #10b981; border-radius: 20px; transition: .4s;"></span>
                                <span class="slider-dot" style="position: absolute; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; transform: translateX(18px);"></span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="distribution-section">
                    <h3>2. Mensaje Redes Sociales</h3>
                    <div style="position: relative; border: 1px solid var(--color-border); border-radius: 8px; background: var(--color-background); padding: 10px;">
                        <textarea id="social-post-text" rows="4" placeholder="¡He publicado un nuevo avance! Únete a la conversación..." style="border:none; background:transparent; box-shadow:none; padding:0; width:100%; resize:none; color:var(--color-text-primary); font-family:inherit;"></textarea>
                        
                        <div id="social-image-preview-container" style="display:none; position:relative; margin-top:10px;">
                            <button type="button" onclick="StudioApp.removeSocialImage()" style="position:absolute; top:5px; right:5px; background:rgba(0,0,0,0.7); color:white; border:none; border-radius:50%; width:25px; height:25px; cursor:pointer; z-index:2;">&times;</button>
                            <img id="social-image-preview" src="" style="width:100%; max-height:200px; object-fit:contain; border-radius:8px; border:1px solid var(--color-border); background-color:#1e293b;">
                        </div>

                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px; border-top: 1px dashed var(--color-border); padding-top: 10px;">
                            <div style="display:flex; gap:10px;">
                                <input type="file" id="social-image-upload" accept="image/jpeg, image/png" style="display:none;" onchange="StudioApp.handleSocialImageUpload(event)">
                                <button class="icon-btn" style="width:30px; height:30px; font-size:0.9rem;" onclick="document.getElementById('social-image-upload').click()" title="Adjuntar imagen"><i class="fa-solid fa-image"></i></button>
                            </div>
                            <div class="char-counter" style="margin:0;">
                                <span id="social-char-count">0</span> / <span id="social-char-limit">300</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="distribution-section" id="social-image-attach-section" style="display: none; border: 1px dashed var(--color-accent);">
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <img id="social-attached-preview" src="" style="width: 40px; height: 40px; border-radius: 4px; object-fit: cover;">
                        <label style="font-size: 0.8rem; cursor: pointer; color: var(--color-text-primary);">
                            <input type="checkbox" id="checkbox-attach-image" checked> Adjuntar a la Comunidad
                        </label>
                    </div>
                </div>

                <div class="distribution-section">
                    <h3>3. Enlace (DOI)</h3>
                    <input type="text" id="social-post-link" class="form-control" placeholder="https://doi.org/...">
                </div>

                <div class="distribution-actions" style="margin-top: auto;">
                    <button id="save-draft-btn" class="btn-secondary w-100 mb-2"><i class="fa-regular fa-floppy-disk"></i> Guardar Borrador</button>
                    <button id="publish-btn" class="btn-publish w-100"><i class="fa-solid fa-paper-plane"></i> Publicar Ahora</button>
                </div>
            </div>
        </aside>

        <section class="col-editor pane">
            <div class="pane-header">
                <input type="text" id="post-title" class="editor-title-input" placeholder="Escribe un título atractivo para tu artículo...">
            </div>
            
            <div class="editor-container" style="background: transparent; border: none; padding: 10px 0;">
                <div id="editorjs"></div>
            </div>

            <div class="media-tray" style="margin-top: 3rem;">
                <h4><i class="fa-solid fa-paperclip"></i> Archivos Adjuntos</h4>
                <div id="media-gallery" class="media-gallery">
                    <p class="empty-tray-text">Las imágenes generadas aparecerán aquí.</p>
                </div>
            </div>
        </section>

        <div id="lightbox-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; justify-content:center; align-items:center; flex-direction:column;">
            <span onclick="document.getElementById('lightbox-modal').style.display='none'" style="position:absolute; top:20px; right:30px; color:white; font-size:40px; cursor:pointer;">&times;</span>
            <img id="lightbox-img" src="" style="max-width:90%; max-height:70%; border-radius:8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px;">
            <div style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;">
                <button onclick="StudioApp.downloadLocalImage()" class="btn-secondary"><i class="fa-solid fa-download"></i> Guardar en PC</button>
                <button id="upload-imgbb-btn" onclick="StudioApp.uploadToImgBB()" class="btn-primary"><i class="fa-solid fa-cloud-arrow-up"></i> Insertar al Artículo</button>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="/inv/js/editor.js"></script>
</body>
</html>
