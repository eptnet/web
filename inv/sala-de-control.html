<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de Control - Epistecnología</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/hFRyKrxY/logo-epist-v3-1x1-c.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/inv/css/sala-de-control.css">
</head>
<body>
    <header class="control-room-header">
        <a href="/inv/dashboard.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Volver al Dashboard</a>
        <h2 id="control-session-title">Cargando Sesión...</h2>
        
        <div class="session-controls">
            <div id="live-status-badge" class="status-badge status-waiting">
                <i class="fa-solid fa-clock"></i> En Espera
            </div>
            <button id="btn-stream-action" class="btn-start-stream" disabled>
                <i class="fa-solid fa-spinner fa-spin"></i> Cargando...
            </button>
            <a href="#" id="btn-edit-session" class="btn-edit-settings" target="_blank" title="Ajustes de la sesión">
                <i class="fa-solid fa-gear"></i>
            </a>
        </div>
    </header>

    <main class="control-layout">
        <section class="mixer-panel">
            <iframe id="mixer-iframe" src="" allow="camera; microphone; display-capture; autoplay; fullscreen"></iframe>
        </section>

        <aside class="control-chat-sidebar">
            
            <div id="monitor-wrapper" style="display: none; background: #000; flex-shrink: 0; border-bottom: 1px solid #334155;">
                <div style="font-size: 0.75rem; color: #f59e0b; text-align: center; padding: 4px; background: #1e293b; font-weight: 600;">
                    <i class="fa-solid fa-triangle-exclamation"></i> La señal pública tiene retraso normal aprox. 20 seg.
                </div>
                <div id="monitor-container" style="width: 100%; aspect-ratio: 16/9;">
                    <iframe id="monitor-iframe" src="" allow="autoplay; encrypted-media" allowfullscreen style="width:100%; height:100%; border:none; display:block;"></iframe>
                </div>
            </div>

            <div id="poll-control-panel" class="poll-control-panel">
                <div class="poll-header" id="poll-toggle-btn" style="cursor: pointer; transition: 0.2s; user-select: none;" title="Abrir/Cerrar panel de encuestas">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <i class="fa-solid fa-chevron-down" id="poll-chevron" style="transition: transform 0.3s; font-size: 0.85rem; color: #94a3b8;"></i>
                        <h3 style="margin: 0; font-size: 0.95rem; color: #e2e8f0;"><i class="fa-solid fa-chart-simple"></i> Encuesta Rápida</h3>
                    </div>
                    <span id="poll-status-indicator" class="status-badge status-waiting" style="padding: 2px 8px; font-size:0.7rem;">Cerrada</span>
                </div>
                
                <div id="poll-collapsible-content" style="display: none; padding-top: 15px; margin-top: 10px; border-top: 1px solid #334155;">
                    <div id="poll-setup-area">
                        <input type="text" id="poll-emojis-input" placeholder="Ej: 👍, 🤯, 👎">
                        <button id="btn-launch-poll" class="btn-start-stream" style="width:100%; justify-content:center; padding: 6px; margin-top:8px; font-size: 0.85rem;"><i class="fa-solid fa-bolt"></i> Iniciar Encuesta</button>
                    </div>
                    <div id="poll-results-area" class="hidden">
                        <div id="poll-counters" class="poll-counters"></div>
                        <button id="btn-close-poll" class="btn-stop-stream" style="width:100%; justify-content:center; padding: 6px; margin-top:10px; font-size: 0.85rem;"><i class="fa-solid fa-stop"></i> Cerrar Encuesta</button>
                    </div>
                </div>
            </div>

            <div class="chat-header">
                <h3><i class="fa-solid fa-comments"></i> Chat del Auditorio</h3>
                <span id="control-viewer-count" class="viewer-count"><i class="fa-solid fa-eye"></i> 0</span>
            </div>
            <div id="control-chat-feed" class="chat-feed">
                <p class="chat-system-msg"><i class="fa-solid fa-circle-notch fa-spin"></i> Conectando al auditorio...</p>
            </div>
            <div class="chat-input-area" style="position: relative;">
                <div id="emoji-picker-container-control" class="hidden" style="display: none; position: absolute; bottom: 65px; left: 15px; z-index: 9999; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border-radius: 8px;">
                    <emoji-picker class="dark"></emoji-picker>
                </div>
                
                <button id="btn-emoji-control" title="Añadir emoji" style="background: transparent; border: none; color: #94a3b8; font-size: 1.4rem; cursor: pointer; padding: 0 10px; transition: 0.2s;"><i class="fa-regular fa-face-smile"></i></button>
                
                <input type="text" id="control-chat-input" placeholder="Mensaje como Director...">
                <button id="btn-send-control-chat" title="Enviar"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </aside>
    </main>

    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/inv/js/sala-de-control.js"></script>
</body>
</html>
