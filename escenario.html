<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lienzo OBS - Epistecnología</title>
    <style>
        /* ==========================================================================
           1. RESET Y LIENZO MAESTRO (1920x1080 garantizado)
           ========================================================================== */
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background-color: #0f172a; overflow: hidden; font-family: sans-serif; }
        #particles-js { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 1; }

        /* El contenedor principal usa Grid. Las plantillas cambiarán sus rows/cols */
        #stage-container {
            position: relative; z-index: 10; width: 100%; height: 100%;
            padding: 20px; box-sizing: border-box;
            display: grid; gap: 20px;
            transition: all 0.4s ease-in-out;
        }

        /* ==========================================================================
           2. LAS CAJAS (SLOTS) - Rígidas y contenidas
           ========================================================================== */
        .slot {
            position: relative; background: rgba(0,0,0,0.8); border-radius: 12px; overflow: hidden;
            border: 2px solid rgba(255,255,255,0.15); box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            display: none; opacity: 0; transform: scale(0.95); transition: opacity 0.3s ease, transform 0.3s ease;
            width: 100%; height: 100%; /* Ocupan exactamente el 100% de la celda matemática que les asigne el Grid */
        }
        .slot.active { display: block; opacity: 1; transform: scale(1); }
        
        /* El iframe se adapta a la caja. Si VDO.Ninja recibe &cover, rellenará; si no, pondrá barras negras solas */
        .slot iframe { width: 100%; height: 100%; border: none; pointer-events: none; }

        /* Rótulos */
        .slot-label-container { position: absolute; bottom: 20px; left: 20px; z-index: 20; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(5px); border: 1px solid rgba(56, 189, 248, 0.5); color: white; padding: 6px 15px; border-radius: 6px; opacity: 0; transform: translateY(10px); transition: 0.3s ease;}
        .slot-label-container.show { opacity: 1; transform: translateY(0); }
        .slot-label-text { font-weight: 700; font-size: 1rem; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        /* ==========================================================================
           3. PLANTILLAS SUPERSOURCE (Grid Rígido basado en número de cámaras)
           ========================================================================== */

        /* PLANTILLA A: Mosaico (Automático, se divide según el conteo de cajas activas) */
        .layout-mosaico.count-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
        .layout-mosaico.count-2 { grid-template-columns: repeat(2, 1fr); grid-template-rows: 1fr; }
        .layout-mosaico.count-3 { grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr; }
        .layout-mosaico.count-4 { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); }
        .layout-mosaico.count-5, 
        .layout-mosaico.count-6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
        .layout-mosaico.count-7, 
        .layout-mosaico.count-8, 
        .layout-mosaico.count-9 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); }
        .layout-mosaico.count-10 { grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(3, 1fr); } /* 10 cajas encajan en un 4x3 */

        /* PLANTILLA B: Foco Principal (Caja 1 Gigante Arriba, Resto Abajo) */
        .layout-foco { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); grid-template-rows: 2.5fr 1fr; }
        .layout-foco #slot-1.active { grid-column: 1 / -1; margin: 0 auto 20px auto; } /* Abarca toda la fila superior */
        .layout-foco .slot.active:not(#slot-1) { grid-row: 2 / 3; } /* El resto a la fila inferior */

        /* PLANTILLA C: Presentación (Caja 10 [Media] 75% a la izquierda, Resto apilado a la derecha) */
        .layout-presentacion { grid-template-columns: 3fr 1fr; grid-auto-rows: max-content; align-content: center; }
        .layout-presentacion #slot-10.active { grid-column: 1 / 2; grid-row: 1 / 20; } /* Caja 10 ocupa todo el alto izquierdo */
        .layout-presentacion .slot.active:not(#slot-10) { grid-column: 2 / 3; } /* Resto se apila en la columna derecha */

        /* PLANTILLA D: 2 Split (Obliga a 2 columnas siempre, oculta las demás por JS) */
        .layout-split { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }

        /* PLANTILLA E: Fullscreen (Obliga a 1 columna siempre) */
        .layout-full { grid-template-columns: 1fr; grid-template-rows: 1fr; }

    </style>
</head>
<body>
    <div id="particles-js"></div>
    
    <div id="stage-container" class="layout-mosaico count-0">
        <div class="slot" id="slot-1"><iframe src=""></iframe><div class="slot-label-container"><span class="slot-label-text"></span></div></div>
        <div class="slot" id="slot-2"><iframe src=""></iframe><div class="slot-label-container"><span class="slot-label-text"></span></div></div>
        <div class="slot" id="slot-3"><iframe src=""></iframe><div class="slot-label-container"><span class="slot-label-text"></span></div></div>
        <div class="slot" id="slot-4"><iframe src=""></iframe><div class="slot-label-container"><span class="slot-label-text"></span></div></div>
        <div class="slot" id="slot-5"><iframe src=""></iframe><div class="slot-label-container"><span class="slot-label-text"></span></div></div>
        <div class="slot" id="slot-6"><iframe src=""></iframe><div class="slot-label-container"><span class="slot-label-text"></span></div></div>
        <div class="slot" id="slot-7"><iframe src=""></iframe><div class="slot-label-container"><span class="slot-label-text"></span></div></div>
        <div class="slot" id="slot-8"><iframe src=""></iframe><div class="slot-label-container"><span class="slot-label-text"></span></div></div>
        <div class="slot" id="slot-9"><iframe src=""></iframe><div class="slot-label-container"><span class="slot-label-text"></span></div></div>
        <div class="slot" id="slot-10"><iframe src=""></iframe><div class="slot-label-container"><span class="slot-label-text">Media/PPT</span></div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <script>
        // Efecto visual de fondo
        particlesJS("particles-js", { "particles": { "number": { "value": 60, "density": { "enable": true, "value_area": 800 } }, "color": { "value": "#38bdf8" }, "shape": { "type": "circle" }, "opacity": { "value": 0.5 }, "size": { "value": 3, "random": true }, "line_linked": { "enable": true, "distance": 150, "color": "#38bdf8", "opacity": 0.4, "width": 1 }, "move": { "enable": true, "speed": 2, "direction": "none" } }, "retina_detect": true });

        // Conexión Supabase
        const SUPABASE_URL = 'https://seyknzlheaxmwztkfxmk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNleWtuemxoZWF4bXd6dGtmeG1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDkyNjc5MTQsImV4cCI6MjA2NDg0MzkxNH0.waUUTIWH_p6wqlYVmh40s4ztG84KBPM_Ut4OFF6WC4E';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const sessionId = new URLSearchParams(window.location.search).get('id');

        if (sessionId) initStage();

        async function initStage() {
            const { data: session } = await supabaseClient.from('sessions').select('active_layout, mixer_slots').eq('id', sessionId).single();
            if (session) applyStageData(session);
            
            supabaseClient.channel('stage_' + sessionId)
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'sessions', filter: `id=eq.${sessionId}` }, (payload) => applyStageData(payload.new))
                .subscribe();
        }

        function applyStageData(data) {
            const stageContainer = document.getElementById('stage-container');
            const slotsData = data.mixer_slots || [];
            const layoutType = data.active_layout || 'mosaico';
            
            let activeCount = 0; // Llevaremos el conteo de fuentes para el CSS

            // 1. Iterar sobre las 10 cajas y prender/apagar
            for (let i = 1; i <= 10; i++) {
                const slotDiv = document.getElementById(`slot-${i}`);
                const iframe = slotDiv.querySelector('iframe');
                const labelContainer = slotDiv.querySelector('.slot-label-container');
                const labelText = slotDiv.querySelector('.slot-label-text');
                
                const config = slotsData.find(s => s.id === i);

                // Lógica de visibilidad (Tiene URL y el Ojo está prendido)
                if (config && config.url && config.isVisible) {
                    
                    // Filtrado extra para plantillas restrictivas:
                    // Si el director elige "Split", solo aceptamos las 2 primeras cámaras prendidas. 
                    // Si elige "Full", solo la 1era prendida.
                    if (layoutType === 'split' && activeCount >= 2) {
                        slotDiv.classList.remove('active');
                        continue;
                    }
                    if (layoutType === 'full' && activeCount >= 1 && i !== 10) {
                        slotDiv.classList.remove('active');
                        continue;
                    }

                    activeCount++; // Sumamos al contador oficial

                    // Gestión de Cover / Original
                    let targetUrl = config.url;
                    if (targetUrl.includes('vdo.ninja')) {
                        const urlObj = new URL(targetUrl);
                        if (config.fit === 'cover') {
                            if (!urlObj.searchParams.has('cover')) urlObj.searchParams.append('cover', '');
                        } else {
                            urlObj.searchParams.delete('cover');
                        }
                        targetUrl = urlObj.toString().replace(/cover=&/g, 'cover&').replace(/cover=$/g, 'cover');
                    }

                    if (iframe.src !== targetUrl) iframe.src = targetUrl;
                    slotDiv.classList.add('active');
                    
                    labelText.textContent = config.label || `Fuente ${i}`;
                    if (config.showLabel) labelContainer.classList.add('show'); else labelContainer.classList.remove('show');
                
                } else {
                    // Apagar caja
                    slotDiv.classList.remove('active');
                    labelContainer.classList.remove('show');
                    // Solo borramos el iframe si eliminaron la URL por completo, sino lo dejamos pausado para no reconectar
                    if (!config || !config.url) iframe.src = ''; 
                }
            }

            // 2. Aplicar las clases matemáticas al contenedor
            stageContainer.className = `layout-${layoutType} count-${activeCount}`;
        }
    </script>
</body>
</html>
